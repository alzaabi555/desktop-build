name: 🧹 Bulk Delete Artifacts
on: 
  workflow_dispatch: # هذا السطر يجعلك قادراً على تشغيله يدوياً بضغطة زر

jobs:
  delete-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "جاري البحث عن الملفات وتدميرها... 🚀"
          gh api repos/${{ github.repository }}/actions/artifacts \
            --paginate -q '.artifacts[].id' | \
          xargs -I{} gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/{}
          echo "تم تنظيف المستودع بنجاح! 🧹✨"
