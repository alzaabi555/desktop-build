name: Build Windows Desktop App (EXE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Electron App
        run: npm run electron:dist -- --publish never

      - name: Verify Windows Installer
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem -Path "dist" -Filter "*.exe" -File -ErrorAction SilentlyContinue)

          if ($installers.Count -eq 0) {
            Write-Host "No Windows EXE installer was found in the dist directory."

            if (Test-Path -Path "dist") {
              Write-Host "Files found inside dist:"

              Get-ChildItem -Path "dist" -Recurse | ForEach-Object {
                Write-Host $_.FullName
              }
            }
            else {
              Write-Host "The dist directory does not exist."
            }

            exit 1
          }

          Write-Host "Windows installer files:"

          foreach ($installer in $installers) {
            Write-Host "$($installer.Name) - $($installer.Length) bytes"
          }

      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Windows-Setup
          path: dist/*.exe
          if-no-files-found: error
