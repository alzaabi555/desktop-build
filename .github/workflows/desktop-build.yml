name: Build Windows Desktop App (EXE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Electron App
        run: npm run electron:dist -- --publish never

      - name: Verify Windows Installer
        shell: pwsh
        run: |
          $installers = Get-ChildItem `
            -Path "dist" `
            -Filter "*.exe" `
            -Fil* `
            -ErrorAction Silent*yContinue

          if (-not $ins*allers) {
              Write-Erro* "No Windows EXE installer was fou*d in the dist directory."

       *      if (Test-Path "dist") {
    *             Write-Host "Files fou*d inside dist:"

                  Get-ChildItem -Path "dist" -Recurse |
                  Select-Object -ExpandProperty FullName
              }
              else {
                  Write-Host "The dist directory does not exist."
              }

              exit 1
          }

          Write-Host "Windows installer files:"

          $installers | ForEach-Object {
              Write-Host "$($_.Name) - $($_.Length) bytes"
          }

      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Windows-Setup
          path: dist/*.exe
          if-no-files-found: error
