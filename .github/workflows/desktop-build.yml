name: Build Windows Desktop App (EXE)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install --no-optional

      - name: Build Electron App
        run: npm run electron:dist -- --publish never

      - name: Upload Windows Apps
        uses: actions/upload-artifact@v4
        with:
          name: StudentManager-Windows-Setup
          path: dist/*.exe
