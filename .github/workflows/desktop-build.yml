name: Build Windows Desktop App (EXE)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    # 💉 السطر السحري: إعطاء صلاحية الكتابة لتجاوز خطأ 404 Not Found
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # تثبيت المكتبات اللازمة مع تجاهل الاختيارية لتجنب أخطاء البناء
      - name: Install Dependencies
        run: npm install --no-optional

      # 🧠 تحميل الدماغ العربي (Vosk Model) وفك ضغطه برمجياً
      # سيقوم جيت هوب بتحميل الملف، فك ضغطه، إعادة تسميته إلى "vosk-model"، ثم حذف الملف المضغوط
      - name: Download and Extract Vosk Model
        run: |
          Invoke-WebRequest -Uri "https://alphacephei.com/vosk/models/vosk-model-small-ar-0.3.zip" -OutFile "vosk-model.zip"
          Expand-Archive -Path "vosk-model.zip" -DestinationPath "."
          Rename-Item -Path "vosk-model-small-ar-0.3" -NewName "vosk-model"
          Remove-Item "vosk-model.zip"

      # بناء تطبيق سطح المكتب
      - name: Build Electron App
        run: npm run electron:dist -- --publish never

      # رفع ملفات التطبيق (exe) ليمكنك تحميلها من صفحة Actions
      - name: Upload Windows Apps
        uses: actions/upload-artifact@v4
        with:
          name: StudentManager-Windows-Setup
          path: |
            dist/*.exe
            dist/**/*.appx
