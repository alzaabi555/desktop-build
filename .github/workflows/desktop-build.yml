name: Build Windows Desktop App (EXE)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 💉 الحل الجذري لمشكلة C++: إجبار السيرفر على استخدام CMD بدلاً من PowerShell
      # وتحديد نسخة مترجم مايكروسوفت (msvs_version)
      - name: Install Dependencies
        run: npm install
        shell: cmd
        env:
          npm_config_msvs_version: 2022

      # 🧠 تحميل الدماغ العربي (Vosk Model)
      - name: Download and Extract Vosk Model
        run: |
          Invoke-WebRequest -Uri "https://alphacephei.com/vosk/models/vosk-model-small-ar-0.3.zip" -OutFile "vosk-model.zip"
          Expand-Archive -Path "vosk-model.zip" -DestinationPath "."
          Rename-Item -Path "vosk-model-small-ar-0.3" -NewName "vosk-model"
          Remove-Item "vosk-model.zip"
        shell: pwsh # نبقي هذا السطر يعمل بـ PowerShell لأنه يحتاج أوامر تحميل حديثة

      # بناء تطبيق سطح المكتب
      - name: Build Electron App
        run: npm run electron:dist -- --publish never
        shell: cmd

      # رفع ملفات التطبيق
      - name: Upload Windows Apps
        uses: actions/upload-artifact@v4
        with:
          name: StudentManager-Windows-Setup
          path: dist/*.exe
